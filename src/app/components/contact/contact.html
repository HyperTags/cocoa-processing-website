<!-- Simple Contact Form Section -->
<section id="contact" class="row justify-content-center py-5">
  <div class="col-md-6">
    <div class="bg-white p-4 shadow-sm rounded-3">
      <h2 class="fw-bold text-center mb-4 h3">Inquire About Bulk Offtaking</h2>
      <form action="#" method="POST">
        <div class="mb-3">
          <label for="name" class="form-label small fw-bold">Full Name / Organization</label>
          <input type="text" class="form-error form-control" id="name" required />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label small fw-bold">Corporate Email Address</label>
          <input type="email" class="form-control" id="email" required />
        </div>
        <div class="mb-3">
          <label for="message" class="form-label small fw-bold">Sourcing Requirements</label>
          <textarea
            class="form-control"
            id="message"
            rows="4"
            placeholder="Specify tonnage, grade, or certification parameters required..."
            required
          ></textarea>
        </div>
        <button type="submit" class="btn btn-cocoa w-100 py-2">Submit Allocation Request</button>
      </form>
    </div>
  </div>
</section>
